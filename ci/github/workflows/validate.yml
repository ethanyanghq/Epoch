name: Validate Baseline

on:
  push:
  pull_request:

jobs:
  baseline:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate build prerequisites
        run: tools/scripts/build_macos.sh

      - name: Validate repository checks
        run: tools/scripts/run_tests.sh
